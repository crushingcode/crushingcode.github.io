# Hugo configuration file
baseURL: "https://crushingcode.nisrulz.com/"
title: Crushing C.O.D.E

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
enableInlineShortcodes: true

outputs:
  home: [html, llms]
  page: [html]
  section: [html, rss]

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: Showcase
      pageRef: /showcase
      weight: 2
    - identifier: more
      name: More
      weight: 3
    - name: Archives
      pageRef: /archives
      parent: more
    - name: About
      pageRef: /about
      parent: more
    - name: Tags
      pageRef: /tags
      parent: more
    - name: Talks
      pageRef: /talks
      parent: more
    - name: Search
      weight: 7
      params:
        type: search
    - name: GitHub
      weight: 11
      url: "https://github.com/nisrulz"
      params:
        icon: github
    - name: Bluesky
      weight: 12
      url: "https://bsky.app/profile/nisrulz.com"
      params:
        icon: bluesky
    - name: LinkedIn
      weight: 13
      url: "https://linkedin.com/in/nisrulz"
      params:
        icon: linkedin

  sidebar:
    - name: More
      params:
        type: separator
      weight: 1
    - name: "🌏 nisrulz.com ↗"
      url: "https://nisrulz.com/"
      weight: 2

params:
  description: Blog by Nishant Srivastava

  externalLinkDecoration: true
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo/logo.png
      dark: images/logo/logo.png
    width: wide

  # Search
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: title

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  archives:
    section: blog

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    width: wide

  editURL:
    enable: false

  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  # Display the author of the last modification
  displayUpdatedAuthor: true

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: publishDate
      sortOrder: desc # or "asc"
      # Pagination
      pagerSize: 5
    article:
      displayPagination: true

  toc:
    displayTags: true

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover
